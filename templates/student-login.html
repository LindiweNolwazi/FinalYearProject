<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login - GoFundMe Connect</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="auth-container">
    <h2>Student Login</h2>
    <form id="loginForm">
      <input type="hidden" id="loginRole" value="student">
      
      <div class="form-group">
        <label>Email:</label>
        <input type="email" id="loginEmail" required>
      </div>
      
      <div class="form-group">
        <label>Password:</label>
        <input type="password" id="loginPassword" required>
      </div>
      
      <button type="submit" class="btn btn-primary">Login</button>

      <p><a href="{{ url_for('student_forgot_password') }}">Forgot Password?</a></p>

      <p>Don't have an account? <a href="{{ url_for('student_register') }}">Register</a></p>
    </form>
  </main>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
