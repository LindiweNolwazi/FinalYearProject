<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sponsor Registration - GoFundMe Connect</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="auth-container">
    <h2>Sponsor Registration</h2>
    <form id="registerForm">
      <input type="hidden" id="regRole" value="sponsor">
      
      <div class="form-group">
        <label>Full Name / Organization:</label>
        <input type="text" id="regFullName" required>
      </div>
      
      <div class="form-group">
        <label>Email:</label>
        <input type="email" id="regEmail" required>
      </div>
      
      <div class="form-group">
        <label>Password:</label>
        <input type="password" id="regPassword" required>
      </div>
      
      <div class="form-group">
        <label>Confirm Password:</label>
        <input type="password" id="regConfirmPassword" required>
      </div>
      
      <div class="form-group">
        <label>Organization:</label>
        <input type="text" id="regOrganization" required>
      </div>
      
      <button type="submit" class="btn btn-primary">Register</button>
      
      <p>Already have an account? <a href="{{ url_for('sponsor_login') }}">Log In</a></p>
    </form>
  </main>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
