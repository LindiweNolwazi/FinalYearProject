<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Student Password Reset Request</title>
</head>
<body>
    <h2>Student Password Reset</h2>
    <form id="forgotPasswordForm" method="POST" action="/password-reset/request">
        <input type="hidden" name="role" value="student" />
        <label for="email">Enter your registered email:</label><br />
        <input type="email" id="email" name="email" required /><br /><br />
        <button type="submit">Send Reset Link</button>
    </form>
</body>
</html>
